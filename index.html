<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<title>Cat Legion</title>
<style>
:root {
  --bg-deep: #0a0a1a;
  --bg-card: rgba(255,255,255,0.04);
  --bg-card-hover: rgba(255,255,255,0.07);
  --border-subtle: rgba(255,255,255,0.08);
  --border-glow: rgba(168,85,247,0.4);
  --text-primary: #f0e6ff;
  --text-secondary: #a89bb5;
  --text-dim: #6b5e7a;
  --accent-purple: #a855f7;
  --accent-gold: #f59e0b;
  --accent-green: #22c55e;
  --accent-red: #ef4444;
  --accent-cyan: #06b6d4;
  --font-pixel: 'Press Start 2P', monospace;
  --font-ui: 'Inter', system-ui, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg-deep);
  color:var(--text-primary);
  font-family:var(--font-ui);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
#app{
  width:100%;max-width:420px;min-height:100vh;
  background:linear-gradient(180deg,#12062e 0%,#0d1b3e 50%,var(--bg-deep) 100%);
  position:relative;overflow:hidden;
}
#game-canvas{width:100%;height:280px;display:block;background:linear-gradient(180deg,#1a0a2e 0%,#0d1b3e 100%)}
#ui{padding:14px 16px 20px}
.panel{
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:14px;padding:14px;margin-bottom:10px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}

/* CAT CARDS */
.cat-row{
  display:flex;gap:12px;align-items:center;
  padding:14px 16px;
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:12px;margin-bottom:8px;
  cursor:pointer;transition:all 0.2s ease;
  position:relative;overflow:hidden;
}
.cat-row:hover{background:var(--bg-card-hover);border-color:var(--border-glow)}
.cat-row.selected{
  border-color:var(--accent-gold);
  box-shadow:0 0 20px rgba(245,158,11,0.15),inset 0 0 20px rgba(245,158,11,0.03);
  background:rgba(245,158,11,0.06);
}
.cat-row:active{transform:scale(0.98)}
.cat-icon{
  font-size:32px;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  flex-shrink:0;
}
.cat-info{flex:1;min-width:0}
.cat-name{font-weight:700;font-size:14px;letter-spacing:-0.01em}
.cat-stats{font-size:11px;color:var(--text-secondary);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.cat-stats span{white-space:nowrap}
.cat-hp-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:6px;overflow:hidden}
.cat-hp-fill{height:100%;border-radius:3px;transition:width 0.4s ease;background:linear-gradient(90deg,var(--accent-green),#4ade80)}

/* ENEMY SECTION */
.enemy-section{text-align:center;padding:12px 0 8px}
.enemy-name{
  font-family:var(--font-pixel);font-size:10px;
  font-weight:400;color:var(--accent-red);
  margin-bottom:6px;letter-spacing:0.05em;text-shadow:0 0 10px rgba(239,68,68,0.3);
}
.enemy-hp{font-size:11px;color:var(--text-dim);margin-top:4px;font-family:var(--font-pixel);font-size:9px}

/* HP BAR */
.hp-bar-outer{height:12px;background:rgba(0,0,0,0.4);border-radius:6px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3)}
.hp-bar-inner{height:100%;border-radius:6px;transition:width 0.4s ease;
  background:linear-gradient(180deg,#ff6b6b 0%,#e74c3c 50%,#c0392b 100%);
  box-shadow:0 0 8px rgba(239,68,68,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
}

/* GOLD */
.gold-display{
  display:flex;align-items:center;gap:6px;
  font-size:22px;font-weight:900;color:var(--accent-gold);
  text-shadow:0 0 20px rgba(245,158,11,0.3);
}

/* BUTTONS */
.btn{
  background:linear-gradient(180deg,#7c3aed 0%,#6d28d9 100%);
  color:#fff;border:none;padding:12px 20px;border-radius:10px;
  font-weight:700;cursor:pointer;font-size:14px;
  transition:all 0.15s ease;
  width:100%;position:relative;overflow:hidden;
  font-family:var(--font-ui);letter-spacing:-0.01em;
  box-shadow:0 4px 15px rgba(124,58,237,0.3),inset 0 1px 0 rgba(255,255,255,0.1);
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.96);box-shadow:0 2px 8px rgba(124,58,237,0.2)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px;white-space:nowrap}
.btn-gold{
  background:linear-gradient(180deg,#f59e0b 0%,#d97706 100%);
  box-shadow:0 4px 15px rgba(245,158,11,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-green{
  background:linear-gradient(180deg,#22c55e 0%,#16a34a 100%);
  box-shadow:0 4px 15px rgba(34,197,94,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-danger{
  background:linear-gradient(180deg,#ef4444 0%,#dc2626 100%);
  box-shadow:0 4px 15px rgba(239,68,68,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:0}
.tab{
  flex:1;padding:10px 8px;text-align:center;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-subtle);
  border-radius:10px 10px 0 0;cursor:pointer;
  font-size:12px;font-weight:600;transition:0.2s;
  color:var(--text-dim);
}
.tab.active{
  background:rgba(168,85,247,0.12);
  border-color:var(--accent-purple);
  color:var(--accent-purple);
  box-shadow:0 -2px 10px rgba(168,85,247,0.1);
}
.tab-content{display:none}
.tab-content.active{display:block}

/* DAMAGE NUMBERS */
.damage-pop{
  position:absolute;font-weight:900;pointer-events:none;
  animation:popUp 1.2s ease-out forwards;
  font-family:var(--font-pixel);font-size:11px;
  text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000;
  z-index:100;
}
@keyframes popUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  50%{opacity:1;transform:translateY(-20px) scale(1.1)}
  100%{opacity:0;transform:translateY(-50px) scale(0.8)}
}

.gold-gain{
  position:absolute;color:var(--accent-gold);font-weight:900;
  pointer-events:none;animation:floatUp 1.5s ease-out forwards;
  font-family:var(--font-pixel);font-size:12px;
  text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000;
  z-index:100;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-70px)}
}

/* INVENTORY ITEMS */
.inv-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border-subtle);
  border-radius:10px;margin-bottom:6px;font-size:12px;
  transition:all 0.15s;
}
.inv-item:hover{background:rgba(255,255,255,0.05);border-color:var(--border-glow)}
.inv-item .btn-sm{font-size:10px;padding:6px 10px}

/* PROGRESS BAR */
.progress-bar-outer{
  height:6px;background:rgba(0,0,0,0.3);border-radius:3px;
  overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);
}
.progress-bar-inner{
  height:100%;border-radius:3px;transition:width 0.5s ease;
  background:linear-gradient(90deg,var(--accent-purple),var(--accent-gold));
  box-shadow:0 0 10px rgba(168,85,247,0.4);
}

/* SPEED/AUTO BUTTONS */
.util-btn{
  padding:8px 12px;font-size:11px;font-weight:600;
  border-radius:8px;border:1px solid var(--border-subtle);
  background:rgba(255,255,255,0.04);
  color:var(--text-secondary);cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
  font-family:var(--font-ui);
}
.util-btn:active{transform:scale(0.95)}
.util-btn.active{
  background:rgba(168,85,247,0.15);
  border-color:var(--accent-purple);
  color:var(--accent-purple);
}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* SHAKE */
.shake{animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>
<div id="app">
  <canvas id="game-canvas"></canvas>
  <div id="ui">
    <div class="panel" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:12px;color:#aaa">CAT LEGION</div>
        <div style="font-size:10px;color:#666">Wave <span id="wave">1</span> · Kills <span id="kills">0</span> · Prestige <span id="prestige">0</span></div>
        <div class="progress-bar-outer" style="margin-top:6px">
          <div id="progress-bar" class="progress-bar-inner" style="height:100%;width:0%;background:linear-gradient(90deg,#a855f7,#ffd700);border-radius:3px;transition:width 0.5s"></div>
        </div>
        <div style="font-size:9px;color:#666;margin-top:2px">Progresso: <span id="progress-text">Wave 1/5</span> · Proximo heroi: Wave <span id="next-hero">3</span></div>
      </div>
      <div class="gold-display">🪙 <span id="gold">0</span></div>
    </div>
    <div id="enemy-section" class="enemy-section">
      <div class="enemy-name" id="enemy-name">Rato Selvagem</div>
      <div class="hp-bar-outer" style="width:220px;margin:8px auto">
        <div id="enemy-hp-fill" class="hp-bar-inner" style="width:100%;height:100%;background:#ff6b6b;border-radius:5px;transition:width 0.3s"></div>
      </div>
      <div class="enemy-hp" id="enemy-hp-text">100/100</div>
    </div>
    <div id="cats-container"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-green" onclick="Game.toggleAutoWave()" id="btn-wave">⚔️ Pausar</button>
      <button class="util-btn" onclick="Game.toggleSpeed()" id="btn-speed">1x</button>
      <button class="util-btn" onclick="Game.toggleAutoSkill()" id="btn-auto">Auto</button>
    </div>
    <div class="tabs" style="margin-top:12px">
      <div class="tab active" onclick="Game.switchTab('team')">Time</div>
      <div class="tab" onclick="Game.switchTab('shop')">Loja</div>
      <div class="tab" onclick="Game.switchTab('inventory')">Inventario</div>
    </div>
    <div id="tab-team" class="tab-content active panel"></div>
    <div id="tab-shop" class="tab-content panel"></div>
    <div id="tab-inventory" class="tab-content panel"></div>
  </div>
</div>
<div id="damage-pop-container" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999"></div>

<script>
// ==================== CAT LEGION ENGINE ====================
const Game = {
  gold: 0, wave: 1, kills: 0, autoAttack: null, selectedCat: null,

  classes: {
    warrior: {name:'Guerreiro',icon:'Warrior',hp:150,atk:18,def:8,spd:10,color:'#ff6b6b',
      skill:{name:'Garra Feroz',dmg:2.5,cd:3,cdMax:3,desc:'Ataque devastador (2.5x)'}},
    mage:    {name:'Mago',icon:'Mage',hp:90,atk:28,def:4,spd:8,color:'#a855f7',
      skill:{name:'Bola de Fogo',dmg:3.5,cd:4,cdMax:4,desc:'Explosao magica (3.5x)'}},
    ninja:   {name:'Ninja',icon:'Ninja',hp:110,atk:22,def:5,spd:15,color:'#4ecdc4',
      skill:{name:'Lamina Sombria',dmg:3.0,cd:3,cdMax:3,desc:'Golpe critico (3x)'}}
  },

  cats: [
    {id:0,cls:'warrior',level:1,xp:0,name:'Tigrao',hp:150,maxHp:150,atk:18,def:8,spd:10,equipment:{weapon:null,armor:null,accessory:null},evolved:false,unlocked:true},
    {id:1,cls:'mage',level:1,xp:0,name:'Merlin',hp:90,maxHp:90,atk:28,def:4,spd:8,equipment:{weapon:null,armor:null,accessory:null},evolved:false,unlocked:false},
    {id:2,cls:'ninja',level:1,xp:0,name:'Shadow',hp:110,maxHp:110,atk:22,def:5,spd:15,equipment:{weapon:null,armor:null,accessory:null},evolved:false,unlocked:false}
  ],
  lastCheckpoint: 1,   // wave checkpoint for revive
  autoWave: true,       // waves start automatically
  heroesUnlocked: 1,    // starts with 1 hero

  enemy: null,

  prestige: 0,
  prestigeBonus: 0,
  gameSpeed: 1,
  comboTimer: 0,
  comboCount: 0,
  autoSkill: false,
  critChance: 10,      // 10% base crit
  critDmg: 2.0,        // 2x crit damage
  audioCtx: null,
  waveCleared: false,
  goldAnimTarget: 0,
  goldAnimCurrent: 0,

  enemies: [
    {name:'Rato Selvagem',hp:40,atk:5,def:1,gold:5,xp:3},
    {name:'Morcego Sombrio',hp:55,atk:7,def:2,gold:8,xp:5},
    {name:'Lobo Sombrio',hp:90,atk:10,def:4,gold:15,xp:10},
    {name:'Espectro',hp:130,atk:14,def:6,gold:22,xp:18},
    {name:'Cobra Venenosa',hp:160,atk:18,def:8,gold:30,xp:25},
    {name:'Dragaozinho',hp:200,atk:20,def:10,gold:40,xp:35},
    {name:'Demonio Menor',hp:270,atk:24,def:12,gold:55,xp:50},
    {name:'BOSS Gato Zumbi',hp:350,atk:28,def:15,gold:80,xp:70},
    {name:'BOSS Dragao Anciao',hp:500,atk:35,def:20,gold:150,xp:120},
  ],

  images: {},

  init() {
    this.loadGame();
    this.renderAll();
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.resizeCanvas();
    window.addEventListener('resize', () => this.resizeCanvas());
    
    // Load images
    const imgNames = ['warrior','mage','ninja','background','enemies','equipment'];
    imgNames.forEach(name => {
      const img = new Image();
      img.src = 'assets/' + name + '.png';
      this.images[name] = img;
    });
    
    // Audio context (lazy init on first interaction)
    this.audioCtx = null;
    
    this.startCanvasLoop();
    this.spawnEnemy();
    this.renderAll();
  },

  initAudio() {
    if (!this.audioCtx) {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  },

  playSound(freq, duration, type, vol) {
    if (!this.audioCtx) return;
    type = type || 'square';
    vol = vol || 0.08;
    const osc = this.audioCtx.createOscillator();
    const gain = this.audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, this.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.audioCtx.destination);
    osc.start();
    osc.stop(this.audioCtx.currentTime + duration);
  },

  canvasW: 0, canvasH: 0,
  resizeCanvas() {
    const rect = this.canvas.getBoundingClientRect();
    this.canvasW = rect.width;
    this.canvasH = rect.height;
    this.canvas.width = rect.width * (window.devicePixelRatio || 1);
    this.canvas.height = rect.height * (window.devicePixelRatio || 1);
    this.ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  },

  startCanvasLoop() {
    const draw = () => {
      this.animTime++;
      this.drawCanvas();
      requestAnimationFrame(draw);
    };
    draw();
  },

  drawCanvas() {
    const ctx = this.ctx;
    const w = this.canvas.width / (window.devicePixelRatio || 1);
    const h = this.canvas.height / (window.devicePixelRatio || 1);
    
    // Screen shake
    let sx = 0, sy = 0;
    if (this.screenShake > 0) {
      sx = (Math.random() - 0.5) * this.screenShake * 2;
      sy = (Math.random() - 0.5) * this.screenShake * 2;
      this.screenShake -= 0.5;
    }
    
    ctx.save();
    ctx.translate(sx, sy);
    ctx.clearRect(-10, -10, w + 20, h + 20);

    // Background image
    if (this.images['background'] && this.images['background'].complete) {
      ctx.drawImage(this.images['background'], 0, 0, w, h);
    } else {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
      skyGrad.addColorStop(0, '#1a0a2e');
      skyGrad.addColorStop(0.5, '#2d1b4e');
      skyGrad.addColorStop(1, '#0d1b3e');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, w, h);
    }
    
    // Dark vignette to mask any BG remnants on sprites
    const vGrad = ctx.createRadialGradient(w/2, h-50, w*0.3, w/2, h-50, w*0.8);
    vGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vGrad;
    ctx.fillRect(0, 0, w, h);

    // Floating ambient particles
    if (!this._particles) this._particles = [];
    if (this._particles.length < 15 && Math.random() < 0.5) {
      this._particles.push({
        x: Math.random() * w, y: h - 60 + Math.random() * 40,
        life: 60 + Math.random() * 60, maxLife: 120,
        vy: -0.3 - Math.random() * 0.5
      });
    }
    this._particles = this._particles.filter(p => p.life > 0);
    this._particles.forEach(p => {
      p.y += p.vy;
      p.life--;
      const alpha = p.life / p.maxLife;
      ctx.fillStyle = 'rgba(255,215,0,' + (alpha * 0.3) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
    });

    // Ground
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, h-50, w, 50);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h-50);
    ctx.lineTo(w, h-50);
    ctx.stroke();

    // Cats (with animations) - LEFT SIDE
    const catStartX = 40;
    const catSpacing = 80;
    this.cats.filter(c => c.unlocked).forEach((cat, i) => {
      const alive = cat.hp > 0;
      const visibleCats = this.cats.filter(c => c.unlocked).length;
      const spacing = visibleCats === 1 ? 0 : (visibleCats === 2 ? 60 : 80);
      let ox = catStartX + i * spacing;
      let oy = h - 70;
      
      // Init animation state
      if (!this.animStates[cat.id]) this.animStates[cat.id] = { attack: 0, hit: 0, idle: Math.random() * Math.PI * 2 };
      const anim = this.animStates[cat.id];
      
      // Idle bobbing
      const idleY = Math.sin(this.animTime * 0.05 + anim.idle) * 3;
      oy += idleY;
      
      // Attack lunge
      if (anim.attack > 0) {
        ox += anim.attack * 8;
        anim.attack -= 0.15;
        if (anim.attack < 0) anim.attack = 0;
      }
      
      // Hit shake
      if (anim.hit > 0) {
        ox += Math.sin(anim.hit * 15) * 5;
        anim.hit -= 0.2;
        if (anim.hit < 0) anim.hit = 0;
      }
      
      ctx.globalAlpha = alive ? 1 : 0.2;
      
      // Death animation
      if (!alive) {
        oy += (1 - ctx.globalAlpha) * 30;
      }

      // Cat image
      const imgKey = cat.cls;
      const img = this.images[imgKey];
      if (img && img.complete) {
        const size = 60;
        // Hit flash
        if (anim.hit > 0.5) {
          ctx.globalAlpha = 1;
          ctx.drawImage(img, ox - size/2, oy - size/2, size, size);
          ctx.globalCompositeOperation = 'source-atop';
          ctx.fillStyle = 'rgba(255,255,255,' + (anim.hit * 0.7) + ')';
          ctx.fillRect(ox - size/2, oy - size/2, size, size);
          ctx.globalCompositeOperation = 'source-over';
        }
        ctx.drawImage(img, ox - size/2, oy - size/2, size, size);
      } else {
        const cls = this.classes[cat.cls];
        ctx.fillStyle = cls.color;
        ctx.beginPath();
        ctx.arc(ox, oy, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(cls.icon || '?', ox, oy + 4);
      }

      // Name
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#fff';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(cat.name, ox, oy + 32);

      // HP bar
      if (alive) {
        const barW = 70;
        ctx.fillStyle = '#333';
        ctx.fillRect(ox - barW/2, oy + 34, barW, 4);
        const hpColor = cat.hp < cat.maxHp*0.3 ? '#ff6b6b' : '#4caf50';
        ctx.fillStyle = hpColor;
        ctx.fillRect(ox - barW/2, oy + 40, barW * (cat.hp/cat.maxHp), 5);
      }

      // Level
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#aaa';
      ctx.font = '10px sans-serif';
      ctx.fillText('Lv.' + cat.level + (cat.evolved ? '*' : ''), ox, oy + 45);

      // Skill ready sparkle
      if (alive && cat.skillReady) {
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#ffd700';
        const sparkleSize = 12 + Math.sin(this.animTime * 0.1) * 2;
        ctx.font = sparkleSize + 'px sans-serif';
        ctx.fillText('*', ox + 18, oy - 22);
        ctx.fillText('*', ox - 18, oy - 20);
      }

      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    });

    // Enemy - RIGHT SIDE, large
    if (this.enemy && this.enemy.hp > 0) {
      const ex = w - 60;
      const ey = h - 90;
      const eImg = this.images['enemies'];
      
      if (eImg && eImg.complete) {
        // Draw enemy from sprite sheet based on tier
        const tier = Math.min(Math.floor((this.wave-1)/3), 8);
        const cols = 3;
        const rows = 3;
        const sx = (tier % cols) * (eImg.width / cols);
        const sy = Math.floor(tier / cols) * (eImg.height / rows);
        const sw = eImg.width / cols;
        const sh = eImg.height / rows;
        const size = 80;
        ctx.drawImage(eImg, sx, sy, sw, sh, ex - size/2, ey - size/2, size, size);
      } else {
        // Fallback
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.arc(ex, ey, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex-8, ey-5, 5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex+8, ey-5, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(ex-8, ey-5, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex+8, ey-5, 3, 0, Math.PI*2); ctx.fill();
      }

      // Enemy name
      ctx.fillStyle = '#ff6b6b';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this.enemy.name, ex, ey + 48);

      // Hit particles when enemy damaged
      if (this.enemyFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath(); ctx.arc(ex, ey, 45, 0, Math.PI*2); ctx.fill();
        this.enemyFlash--;
      }

      // HP bar
      const barW = 90;
      ctx.fillStyle = '#333';
      ctx.fillRect(ex - barW/2, ey + 52, barW, 7);
      const hpRatio = this.enemy.hp / this.enemy.maxHp;
      ctx.fillStyle = hpRatio < 0.3 ? '#ff4444' : '#ff6b6b';
      ctx.fillRect(ex - barW/2, ey + 48, barW * hpRatio, 7);
    }
  },

  enemyFlash: 0,
  animTime: 0,
  animStates: {},    // per-cat animation states
  skillEffects: [],  // active skill visual effects
  floatingTexts: [], // damage numbers
  screenShake: 0,

  spawnEnemy() {
    const tier = Math.min(Math.floor((this.wave-1)/3), this.enemies.length-1);
    const template = this.enemies[tier];
    const scale = 1 + (this.wave-1) * 0.15;
    this.enemy = {
      name: template.name,
      hp: Math.floor(template.hp * scale),
      maxHp: Math.floor(template.hp * scale),
      atk: Math.floor(template.atk * scale),
      def: Math.floor(template.def * scale),
      gold: Math.floor(template.gold * scale),
      xp: Math.floor(template.xp * scale),
    };
    this.renderEnemy();
    this.saveGame();
  },

  toggleAutoWave() {
    this.autoWave = !this.autoWave;
    const btn = document.getElementById('btn-wave');
    if (this.autoWave) {
      btn.innerHTML = '⚔️ Pausar';
      btn.className = 'btn btn-green';
      if (!this.autoAttack) this.startWave();
    } else {
      btn.innerHTML = '▶️ Retomar';
      btn.className = 'btn btn-danger';
      if (this.autoAttack) { clearInterval(this.autoAttack); this.autoAttack = null; }
    }
  },

  toggleSpeed() {
    this.gameSpeed = this.gameSpeed === 1 ? 2 : this.gameSpeed === 2 ? 3 : 1;
    document.getElementById('btn-speed').textContent = this.gameSpeed + 'x';
    // Restart wave with new speed
    if (this.autoAttack) {
      clearInterval(this.autoAttack);
      this.autoAttack = setInterval(() => {
        this.combatTick();
        this.tickSkills();
        this.renderAll();
      }, 1500 / this.gameSpeed);
    }
  },

  toggleAutoSkill() {
    this.autoSkill = !this.autoSkill;
    const btn = document.getElementById('btn-auto');
    btn.textContent = this.autoSkill ? 'Auto ON' : 'Auto';
    btn.className = this.autoSkill ? 'util-btn active' : 'util-btn';
  },

  startWave() {
    this.initAudio();
    if (this.autoAttack) clearInterval(this.autoAttack);
    if (!this.enemy || this.enemy.hp <= 0) this.spawnEnemy();

    const aliveCats = this.cats.filter(c => c.unlocked && c.hp > 0);
    if (aliveCats.length === 0) { this.showMessage('Todos os gatos morreram! Reviva-os na loja.'); return; }

    this.autoAttack = setInterval(() => {
      this.combatTick();
      this.tickSkills();
      this.renderAll();
    }, 1500 / this.gameSpeed);

    document.getElementById('btn-wave').textContent = 'Em combate...';
    document.getElementById('btn-wave').disabled = true;
    setTimeout(() => {
      document.getElementById('btn-wave').textContent = 'Iniciar Wave';
      document.getElementById('btn-wave').disabled = false;
    }, 1200);
  },

  combatTick() {
    if (!this.enemy || this.enemy.hp <= 0) {
      this.onEnemyKilled();
      return;
    }

    const aliveCats = this.cats.filter(c => c.unlocked && c.hp > 0);
    if (aliveCats.length === 0) {
      clearInterval(this.autoAttack);
      this.autoAttack = null;
      return;
    }

    // Auto-skill for dead cats or on cooldown
    if (this.autoSkill) {
      aliveCats.forEach(cat => {
        if (cat.skillReady && cat.hp > 0) this.useSkill(cat.id);
      });
    }

    // Cats attack
    aliveCats.forEach(cat => {
      if (this.animStates[cat.id]) this.animStates[cat.id].attack = 1.0;
      let dmg = Math.max(1, cat.atk - this.enemy.def + Math.floor(Math.random()*5));
      let isCrit = false;
      
      // Critical hit check
      if (Math.random() * 100 < this.critChance) {
        dmg = Math.floor(dmg * this.critDmg);
        isCrit = true;
        this.screenShake = 3;
        this.playSound(800, 0.1, 'square', 0.06);
      } else {
        this.playSound(200, 0.05, 'triangle', 0.03);
      }
      
      this.enemy.hp -= dmg;
      this.enemyFlash = isCrit ? 6 : 3;
      this.showDamage(dmg, false);
      
      if (isCrit) {
        this.floatingTexts.push({
          x: 180, y: 80, text: 'CRIT! ' + dmg,
          life: 30, maxLife: 30, size: 20
        });
      }
    });

    if (this.enemy.hp <= 0) {
      this.onEnemyKilled();
      return;
    }

    // Enemy attacks
    const target = aliveCats[Math.floor(Math.random() * aliveCats.length)];
    const dmg = Math.max(1, this.enemy.atk - target.def + Math.floor(Math.random()*3));
    target.hp = Math.max(0, target.hp - dmg);
    // Trigger hit animation
    if (this.animStates[target.id]) this.animStates[target.id].hit = 1.0;
    this.showDamage(dmg, true);
  },

  onEnemyKilled() {
    clearInterval(this.autoAttack);
    this.autoAttack = null;
    
    this.playSound(523, 0.15, 'sine', 0.08);
    setTimeout(() => this.playSound(659, 0.15, 'sine', 0.08), 100);
    setTimeout(() => this.playSound(784, 0.2, 'sine', 0.1), 200);
    
    const reward = this.enemy.gold;
    this.goldAnimTarget = this.gold + reward;
    this.gold += reward;
    this.kills++;
    this.waveCleared = true;

    // Gold float animation
    this.showGoldGain(reward);

    // XP to alive cats
    this.cats.forEach(c => {
      if (c.hp > 0) {
        c.xp += this.enemy.xp;
        this.checkLevelUp(c);
      }
    });

    // Drop chance
    if (Math.random() < 0.3) {
      const drop = this.generateDrop();
      this.addToInventory(drop);
      this.showMessage('Item dropado: ' + drop.name + '!');
    }

    this.enemy = null;
    this.wave++;
    
    // Checkpoint revive every 5 waves
    if (this.wave % 5 === 0) {
      this.lastCheckpoint = this.wave;
      // Full heal + revive all
      this.cats.forEach(c => {
        if (c.unlocked) {
          c.hp = c.maxHp;
          c.skillReady = true;
          c.skillCd = undefined;
        }
      });
      this.showMessage('CHECKPOINT! Wave ' + this.wave + ' - Gatos restaurados!');
      this.playSound(880, 0.2, 'sine', 0.1);
    }
    
    // Hero unlock at waves 3 and 8
    if (this.wave === 3 && !this.cats[1].unlocked) {
      this.cats[1].unlocked = true;
      this.cats[1].hp = this.cats[1].maxHp;
      this.showMessage('Merlin (Mago) desbloqueado!');
      this.playSound(1047, 0.3, 'sine', 0.12);
    }
    if (this.wave === 8 && !this.cats[2].unlocked) {
      this.cats[2].unlocked = true;
      this.cats[2].hp = this.cats[2].maxHp;
      this.showMessage('Shadow (Ninja) desbloqueado!');
      this.playSound(1319, 0.3, 'sine', 0.12);
    }
    
    this.renderAll();
    this.saveGame();
    // Wave clear celebration
    this.floatingTexts.push({
      x: 200, y: 60, text: 'WAVE ' + (this.wave - 1) + ' CLEAR!',
      life: 40, maxLife: 40, size: 22
    });
    
    this.spawnEnemy();
    this.waveCleared = false;

    // Auto-start next wave  
    setTimeout(() => this.startWave(), 1000);
  },

  generateDrop(type) {
    const types = ['weapon','armor','accessory'];
    if (!type) type = types[Math.floor(Math.random()*3)];
    const tier = Math.min(Math.floor((this.wave-1)/5) + 1, 10);
    const prefixes = ['Comum','Incomum','Raro','Epico','Lendario'];
    const prefix = prefixes[Math.min(Math.floor(tier/3), 4)];
    const names = {
      weapon: ['Espada','Cajado','Adaga','Lamina','Machado'],
      armor: ['Colete','Armadura','Manto','Peitoral','Escudo'],
      accessory: ['Anel','Amuleto','Colar','Broche','Alianca']
    };

    return {
      type, tier, prefix,
      name: prefix + ' ' + names[type][Math.floor(Math.random()*5)],
      atk: type==='weapon' ? tier*3 : 0,
      def: type==='armor' ? tier*2 : type==='accessory' ? tier : 0,
      hp: type==='armor' ? tier*8 : type==='accessory' ? tier*4 : 0,
    };
  },

  checkLevelUp(cat) {
    const xpNeeded = cat.level * 50 + Math.floor(Math.pow(cat.level, 1.8) * 10);
    while (cat.xp >= xpNeeded) {
      cat.level++;
      cat.xp -= xpNeeded;
      cat.maxHp += 15;
      cat.hp = cat.maxHp;
      cat.atk += 3;
      cat.def += 1;
      cat.spd += 1;
      this.showMessage(cat.name + ' subiu para nivel ' + cat.level + '!');

      // Evolution at lv20
      if (cat.level >= 20 && !cat.evolved) {
        cat.evolved = true;
        cat.maxHp += 50;
        cat.atk += 10;
        cat.def += 5;
        this.showMessage(cat.name + ' EVOLUIU! ***');
      }
    }
  },

  useSkill(catIndex) {
    const cat = this.cats[catIndex];
    if (cat.hp <= 0 || !cat.skillReady) return;
    
    this.initAudio();

    const cls = this.classes[cat.cls];
    let bonus = cat.evolved ? 1.5 : 1.0;
    
    // Combo system: using skills in quick succession
    if (this.comboTimer > 0) {
      this.comboCount++;
      bonus += this.comboCount * 0.3;
      this.showMessage('COMBO x' + this.comboCount + '! +' + Math.round(this.comboCount*30) + '%');
      this.playSound(600 + this.comboCount * 100, 0.15, 'sawtooth', 0.07);
    } else {
      this.comboCount = 0;
      this.playSound(400, 0.1, 'square', 0.06);
    }
    this.comboTimer = 3; // 3 tick window for next combo
    
    const multiplier = cls.skill.dmg + bonus;
    const dmg = Math.floor(cat.atk * multiplier);

    if (this.enemy && this.enemy.hp > 0) {
      this.enemy.hp = Math.max(0, this.enemy.hp - dmg);
      this.enemyFlash = 5;
      this.screenShake = 4 + this.comboCount;
      // Spawn skill particles
      for (let p = 0; p < 12; p++) {
        const angle = (Math.PI * 2 / 12) * p;
        this.skillEffects.push({
          x: (this.canvasW || 350) - 70, y: (this.canvasH || 280) - 100,
          vx: Math.cos(angle) * (2 + Math.random() * 4),
          vy: Math.sin(angle) * (2 + Math.random() * 4),
          life: 20 + Math.random() * 15,
          maxLife: 35,
          size: 3 + Math.random() * 4,
          color: cls.color.replace('#', 'rgba(') + ',1)'.replace('rgba(ff', 'rgba(255,').replace('rgba(a8', 'rgba(168,').replace('rgba(4e', 'rgba(78,')
        });
      }
      // Fix color format
      this.skillEffects.forEach(e => {
        const hex = e.color.match(/[0-9a-f]{2}/gi);
        if (hex && hex.length >= 3) {
          e.color = 'rgba(' + parseInt(hex[0],16) + ',' + parseInt(hex[1],16) + ',' + parseInt(hex[2],16) + ',1)';
        }
      });
      this.showDamage(dmg, false);
      cat.skillReady = false;
      cat.skillCd = cls.skill.cdMax;
      // Trigger attack anim
      if (this.animStates[cat.id]) this.animStates[cat.id].attack = 1.5;

      if (this.enemy.hp <= 0) {
        this.onEnemyKilled();
      }
    }
  },

  tickSkills() {
    // Combo timer decay
    if (this.comboTimer > 0) {
      this.comboTimer--;
      if (this.comboTimer <= 0) this.comboCount = 0;
    }
    
    this.cats.forEach(cat => {
      if (!cat.skillReady && cat.skillCd !== undefined) {
        cat.skillCd--;
        if (cat.skillCd <= 0) {
          cat.skillReady = true;
          cat.skillCd = undefined;
          if (this.autoSkill && cat.hp > 0) this.useSkill(cat.id);
        }
      }
    });
  },

  showDamage(dmg, isPlayer) {
    const container = document.getElementById('damage-pop-container');
    const el = document.createElement('div');
    el.className = 'damage-pop';
    el.textContent = (isPlayer ? '- ' : '') + dmg;
    el.style.color = isPlayer ? '#ff6b6b' : '#ffd700';
    el.style.left = (80 + Math.random() * 250) + 'px';
    el.style.top = (80 + Math.random() * 120) + 'px';
    el.style.fontSize = (14 + Math.min(dmg/3, 10)) + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  },

  showGoldGain(amount) {
    const container = document.getElementById('damage-pop-container');
    const el = document.createElement('div');
    el.className = 'gold-gain';
    el.textContent = '+' + amount + ' G';
    el.style.left = (140 + Math.random() * 150) + 'px';
    el.style.top = '60px';
    el.style.fontSize = '18px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  },

  showMessage(msg) {
    const container = document.getElementById('damage-pop-container');
    const el = document.createElement('div');
    el.className = 'damage-pop';
    el.textContent = msg;
    el.style.color = '#ffd700';
    el.style.left = '50%';
    el.style.top = '35%';
    el.style.transform = 'translateX(-50%)';
    el.style.fontSize = '16px';
    el.style.fontWeight = 'bold';
    el.style.animation = 'popUp 2.5s ease-out forwards';
    container.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  },

  equipItem(catIndex, item) {
    const cat = this.cats[catIndex];
    const slot = item.type;
    const old = cat.equipment[slot];
    if (old) {
      cat.atk -= old.atk || 0;
      cat.def -= old.def || 0;
      cat.maxHp -= old.hp || 0;
      cat.hp = Math.min(cat.hp, cat.maxHp);
    }
    cat.equipment[slot] = item;
    cat.atk += item.atk || 0;
    cat.def += item.def || 0;
    cat.maxHp += item.hp || 0;
    cat.hp = Math.min(cat.hp + (item.hp || 0), cat.maxHp);
    this.renderAll();
    this.saveGame();
  },

  // ==================== UI RENDERING ====================
  renderCats() {
    const container = document.getElementById('cats-container');
    container.innerHTML = this.cats.filter(c => c.unlocked).map((cat, i) => {
      const color = this.classes[cat.cls].color;
      const hpPct = Math.round(cat.hp / cat.maxHp * 100);
      const skillStatus = cat.skillReady ? 'Pronta!' : (cat.skillCd !== undefined ? cat.skillCd + 's' : 'Pronta!');
      return '<div class="cat-row' + (this.selectedCat === cat.id ? ' selected' : '') + '" ' +
        'onclick="Game.selectedCat=' + cat.id + ';Game.renderAll()" ' +
        'style="border-left:3px solid ' + color + '">' +
        '<div class="cat-icon" style="font-size:22px">' +
        (cat.cls === 'warrior' ? '🐯' : cat.cls === 'mage' ? '🔮' : '🥷') + '</div>' +
        '<div class="cat-info">' +
        '<div class="cat-name">' + cat.name + ' <span style="font-size:10px;color:#888">Nv.' + cat.level + (cat.evolved ? '*' : '') + '</span></div>' +
        '<div class="cat-stats">ATK:' + cat.atk + ' DEF:' + cat.def + ' SPD:' + cat.spd + '</div>' +
        '<div class="cat-hp-bar"><div class="cat-hp-fill" style="width:' + hpPct + '%;background:' + (hpPct<30?'#ff6b6b':'#4caf50') + '"></div></div>' +
        '<div style="font-size:10px;color:#888">HP ' + cat.hp + '/' + cat.maxHp + '</div></div>' +
        '<button class="btn btn-sm' + (cat.skillReady && cat.hp>0?' btn-gold':'') + '" ' +
        'style="font-size:10px;padding:4px 8px" ' +
        'onclick="event.stopPropagation();Game.useSkill(' + cat.id + ')" ' +
        (cat.hp<=0?'disabled':'') + '>' +
        this.classes[cat.cls].skill.name + '<br>' + skillStatus + '</button></div>';
    }).join('');
  },

  renderEnemy() {
    if (!this.enemy) return;
    document.getElementById('enemy-name').textContent = this.enemy.name;
    const hpPct = Math.max(0, Math.round(this.enemy.hp / this.enemy.maxHp * 100));
    document.getElementById('enemy-hp-fill').style.width = hpPct + '%';
    document.getElementById('enemy-hp-text').textContent = Math.max(0, this.enemy.hp) + '/' + this.enemy.maxHp;
  },

      '<div>HP: <b>' + cat.hp + '/' + cat.maxHp + '</b></div><div>SPD: <b>' + cat.spd + '</b></div>' +
      '<div>XP: <b>' + cat.xp + '/' + xpNeed + '</b></div><div>Skill: <b>' + cls.skill.name + '</b></div></div>' +

  renderShopTab() {
    document.getElementById('tab-shop').innerHTML =
      '<div style="font-size:14px;font-weight:bold;margin-bottom:8px">Loja do Gato</div>' +
      '<div style="font-size:12px;color:#aaa;margin-bottom:8px">Compre equipamentos para seus gatos!</div>' +
      '<div style="display:flex;flex-direction:column;gap:6px">' +
      '<button class="btn btn-gold" onclick="Game.buyItem(\'weapon\')">Arma Aleatoria - 50 Gold</button>' +
      '<button class="btn btn-gold" onclick="Game.buyItem(\'armor\')">Armadura Aleatoria - 40 Gold</button>' +
      '<button class="btn btn-gold" onclick="Game.buyItem(\'accessory\')">Acessorio Aleatorio - 30 Gold</button>' +
      '<button class="btn btn-danger" onclick="Game.reviveCats()" style="margin-top:8px">Reviver Gatos - 20 Gold</button>' +
      '<button class="btn" style="margin-top:8px;background:linear-gradient(135deg,#e74c3c,#8e44ad)" ' +
      'onclick="Game.prestigeReset()">Prestige Reset (Wave 15+) - +5 bonus stats permanentes!</button></div>';
  },

  renderInventoryTab() {
    const inventory = JSON.parse(localStorage.getItem('catlegion_inv') || '[]');
    if (inventory.length === 0) {
      document.getElementById('tab-inventory').innerHTML = '<div style="color:#666;text-align:center;padding:12px">Vazio - mate inimigos para ganhar drops!</div>';
      return;
    }
    document.getElementById('tab-inventory').innerHTML =
      '<div style="font-size:14px;font-weight:bold;margin-bottom:8px">Inventario (' + inventory.length + ' itens)</div>' +
      inventory.map((item, i) => '<div class="inv-item">' +
        '<div>' + 
        (item.type === 'weapon' ? '🗡️' : item.type === 'armor' ? '🛡️' : '💍') + ' ' +
        item.name + ' <span style="color:#888">[' + item.type + ']</span></div>' +
        '<div style="color:#aaa">ATK:' + (item.atk||0) + ' DEF:' + (item.def||0) + ' HP:' + (item.hp||0) + '</div>' +
        '<button class="btn btn-sm" style="font-size:10px" onclick="Game.equipFromInventory(' + i + ')">Equipar</button></div>').join('');
  },

  buyItem(type) {
    const costs = {weapon:50, armor:40, accessory:30};
    if (this.gold < costs[type]) { this.showMessage('Ouro insuficiente!'); return; }
    this.gold -= costs[type];
    const item = this.generateDrop(type);
    this.addToInventory(item);
    this.renderAll();
    this.saveGame();
    this.showMessage('Comprado: ' + item.name + '!');
  },

  reviveCats() {
    if (this.gold < 20) { this.showMessage('Ouro insuficiente!'); return; }
    this.gold -= 20;
    this.cats.forEach(c => { if (c.hp <= 0) c.hp = Math.floor(c.maxHp * 0.5); });
    this.renderAll();
    this.saveGame();
    this.showMessage('Gatos revividos com 50% HP!');
  },

  addToInventory(item) {
    const inv = JSON.parse(localStorage.getItem('catlegion_inv') || '[]');
    inv.push(item);
    localStorage.setItem('catlegion_inv', JSON.stringify(inv));
  },

  equipFromInventory(idx) {
    if (this.selectedCat === null) { this.showMessage('Selecione um gato primeiro!'); return; }
    const inv = JSON.parse(localStorage.getItem('catlegion_inv') || '[]');
    if (idx >= inv.length) return;
    const item = inv[idx];
    inv.splice(idx, 1);
    localStorage.setItem('catlegion_inv', JSON.stringify(inv));
    this.equipItem(this.selectedCat, item);
    this.showMessage('Equipado: ' + item.name + '!');
  },

  switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    const idx = tab==='team'?0:tab==='shop'?1:2;
    document.querySelectorAll('.tab')[idx].classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'team') this.renderTeamTab();
    if (tab === 'shop') this.renderShopTab();
    if (tab === 'inventory') this.renderInventoryTab();
  },

  renderAll() {
    this.renderCats();
    this.renderEnemy();
    if (document.getElementById('tab-team').classList.contains('active')) this.renderTeamTab();
        // Animated gold counter
    if (this.goldAnimCurrent < this.gold) {
      this.goldAnimCurrent += Math.max(1, Math.ceil((this.gold - this.goldAnimCurrent) / 5));
      if (this.goldAnimCurrent > this.gold) this.goldAnimCurrent = this.gold;
    }
    if (this.goldAnimCurrent === 0) this.goldAnimCurrent = this.gold;
    document.getElementById('gold').textContent = this.goldAnimCurrent;
    document.getElementById('wave').textContent = this.wave;
    document.getElementById('kills').textContent = this.kills;
    document.getElementById('prestige').textContent = this.prestige;
    
    // Progress bar
    const nextMilestone = Math.ceil(this.wave / 5) * 5;
    const prevMilestone = nextMilestone - 5;
    const progress = ((this.wave - prevMilestone) / 5) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('progress-text').textContent = 'Wave ' + this.wave + '/' + nextMilestone;
    document.getElementById('next-hero').textContent = this.cats[2].unlocked ? '-' : (this.cats[1].unlocked ? '8' : '3');
  },

  // ==================== SAVE/LOAD ====================
  saveGame() {
    const data = {
      gold: this.gold, wave: this.wave, kills: this.kills,
      prestige: this.prestige, prestigeBonus: this.prestigeBonus,
      cats: this.cats.map(c => ({
        id:c.id, cls:c.cls, level:c.level, xp:c.xp, name:c.name,
        hp:c.hp, maxHp:c.maxHp, atk:c.atk, def:c.def, spd:c.spd,
        equipment:c.equipment, evolved:c.evolved, unlocked:c.unlocked
      })),
      lastCheckpoint: this.lastCheckpoint,
      time: Date.now()
    };
    localStorage.setItem('catlegion_save', JSON.stringify(data));
  },

  prestigeReset() {
    if (this.wave < 15) { this.showMessage('Precisa atingir Wave 15 para resetar!'); return; }
    this.prestige++;
    this.prestigeBonus += 5;
    this.gold = Math.floor(this.gold * 0.1);
    this.wave = 1;
    this.kills = 0;
    // Reset cats to lv1 with prestige bonus
    this.cats.forEach(c => {
      const cls = this.classes[c.cls];
      c.level = 1; c.xp = 0; c.evolved = false;
      c.maxHp = cls.hp + this.prestigeBonus * 20;
      c.hp = c.maxHp;
      c.atk = cls.atk + this.prestigeBonus * 3;
      c.def = cls.def + this.prestigeBonus * 2;
      c.spd = cls.spd + this.prestigeBonus;
      c.equipment = {weapon:null, armor:null, accessory:null};
      c.skillReady = true;
    });
    localStorage.setItem('catlegion_inv', '[]');
    this.spawnEnemy();
    this.renderAll();
    this.saveGame();
    this.showMessage('PRESTIGE ' + this.prestige + '! Bonus +' + this.prestigeBonus + ' em todos os stats!');
  },

  loadGame() {
    const raw = localStorage.getItem('catlegion_save');
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      this.gold = data.gold || 0;
      this.wave = data.wave || 1;
      this.kills = data.kills || 0;
      this.prestige = data.prestige || 0;
      this.prestigeBonus = data.prestigeBonus || 0;

      // Offline gold
      const elapsed = Math.floor((Date.now() - (data.time || Date.now())) / 1000);
      const offlineGold = Math.max(0, Math.floor(elapsed / 60) * Math.max(1, this.wave));
      if (offlineGold > 1) {
        this.gold += offlineGold;
        setTimeout(() => this.showMessage('Ouro offline: +' + offlineGold + '!'), 1000);
      }

      if (data.cats) {
        this.cats = data.cats.map(c => {
          c.skillReady = true;
          c.skillCd = undefined;
          c.evolved = c.evolved || false;
          c.unlocked = c.unlocked !== undefined ? c.unlocked : true;
          return c;
        });
      }
      this.lastCheckpoint = data.lastCheckpoint || 1;
      this.heroesUnlocked = this.cats.filter(c => c.unlocked).length;
    } catch(e) { console.error('Load failed', e); }
  },
};

// Auto-save every 30s
setInterval(() => Game.saveGame(), 30000);

// Save on page unload
window.addEventListener('beforeunload', () => Game.saveGame());

// Init
Game.cats.forEach(c => { c.skillReady = true; });
Game.init();
// Auto-start waves
setTimeout(() => {
  if (Game.autoWave && !Game.autoAttack) Game.startWave();
}, 500);
</script>
